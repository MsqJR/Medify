<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 200" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bubbleStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BBAF6" />
      <stop offset="100%" stop-color="#4CA9E5" />
    </linearGradient>
    
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6F5FF" />
      <stop offset="100%" stop-color="#BCE3FF" />
    </linearGradient>

    <linearGradient id="waveTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A9AD9" />
      <stop offset="40%" stop-color="#62B6FF" />
      <stop offset="100%" stop-color="#96D4FF" />
    </linearGradient>

    <linearGradient id="waveBottom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#62B6FF" />
      <stop offset="100%" stop-color="#D0EDFF" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66C2FF" />
      <stop offset="100%" stop-color="#4AA3E8" />
    </linearGradient>

    <!-- Clip Path restricted exactly to the boundary of the cross -->
    <clipPath id="crossClip">
      <path d="M 96,52 H 122 V 78 H 146 V 102 H 122 V 128 H 96 V 102 H 72 V 78 H 96 Z" />
    </clipPath>
  </defs>

  <!-- ICON GROUP -->
  <g transform="translate(10, 0)">
    <!-- Speech Bubble Outline -->
    <path d="M 70,40 
             H 150 
             A 25,25 0 0 1 175,65 
             V 115 
             A 25,25 0 0 1 150,140 
             H 85 
             C 65,140 50,152 46,156 
             C 44,158 42,156 42,153 
             C 42,145 44,128 44,115 
             V 65 
             A 25,25 0 0 1 70,40 Z" 
          fill="none" 
          stroke="url(#bubbleStroke)" 
          stroke-width="5.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>

    <!-- Solid Medical Cross Base -->
    <path d="M 96,52 H 122 V 78 H 146 V 102 H 122 V 128 H 96 V 102 H 72 V 78 H 96 Z" fill="url(#crossGrad)" />

    <!-- Elements clipped strictly inside the cross (No bleed, no flow past edges) -->
    <g clip-path="url(#crossClip)">
      <!-- Lower Wave Overlay -->
      <path d="M 65,96 
               Q 95,81 115,93 
               T 155,89
               L 155,110
               Q 115,110 95,100
               T 65,108 Z" 
            fill="url(#waveBottom)" opacity="0.85" />

      <!-- Upper Wave Overlay -->
      <path d="M 65,90 
               Q 95,73 115,89 
               T 155,83 
               L 155,98 
               Q 115,98 95,95 
               T 65,102 Z" 
            fill="url(#waveTop)" />
    </g>
  </g>

  <!-- TYPOGRAPHY (MEDIFY) -->
  <text x="215" y="132" 
        fill="url(#textGrad)" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
        font-size="102px" 
        font-weight="800" 
        letter-spacing="-1.5px">Medify</text>
</svg>
